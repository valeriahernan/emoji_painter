<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GIF Painter</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#cceeff,#e6ffe6);
  font-family:sans-serif;
}

/* toolbar */
.toolbar{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:20px;
  background:#ffffffcc;
  backdrop-filter:blur(10px);
}

/* botones gifs */
.gif-btn{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.active{
  outline:2px solid green;
}

/* canvas */
#canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* gifs dibujados */
.gif{
  position:absolute;
  pointer-events:none;
  transform-origin:center;
}

/* animación */
@keyframes fallFade{
  to{
    transform:translate(var(--x),120px) rotate(var(--r));
    opacity:0;
  }
}

.fall{
  animation:fallFade 1s ease-out forwards;
}

/* botones */
button{
  border:none;
  border-radius:10px;
  padding:5px 10px;
  cursor:pointer;
  background:#7acb88;
  color:white;
}
</style>
</head>

<body>

<div class="toolbar">
  <img class="gif-btn active" src="https://github.com/valeriahernan/emoji_painter/blob/main/gifs/1.gif">
  <img class="gif-btn" src="gifs/hoja.gif">
  <img class="gif-btn" src="gifs/brillo.gif">
  <img class="gif-btn" src="gifs/hongo.gif">

  <input type="range" id="size" min="30" max="120" value="60">

  <button id="clearBtn">Limpiar</button>
</div>

<div id="canvas"></div>

<script>
const canvas = document.getElementById("canvas");

let drawing = false;
let currentGif = "gifs/flor.gif";

// para simulación de presión
let lastX = 0;
let lastY = 0;

/* seleccionar GIF */
document.querySelectorAll(".gif-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".gif-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentGif = btn.getAttribute("src");
  });
});

/* pointer events (mouse + touch + stylus) */
document.addEventListener("pointerdown",(e)=>{
  drawing = true;
  draw(e);
});

document.addEventListener("pointerup",()=>{
  drawing = false;
});

document.addEventListener("pointermove",(e)=>{
  if(!drawing) return;
  draw(e);
});

/* dibujar */
function draw(e){
  const img = document.createElement("img");
  img.className = "gif";

  img.src = currentGif;

  // 🧠 presión real o simulada
  let pressure = e.pressure;

  if(!pressure || pressure === 0){
    let dx = e.clientX - lastX;
    let dy = e.clientY - lastY;
    let speed = Math.sqrt(dx*dx + dy*dy);

    pressure = Math.min(speed / 20, 1); // normalizar
  }

  let baseSize = document.getElementById("size").value;
  let size = baseSize * (0.5 + pressure);

  img.style.width = size + "px";

  img.style.left = e.clientX + "px";
  img.style.top = e.clientY + "px";

  // 🌬️ viento dinámico
  let wind = (Math.random() - 0.5) * 150 * pressure;
  let rotation = (Math.random() - 0.5) * 60;

  img.style.setProperty("--x", wind + "px");
  img.style.setProperty("--r", rotation + "deg");

  canvas.appendChild(img);

  // animación
  setTimeout(()=>img.classList.add("fall"),1000);
  setTimeout(()=>img.remove(),2000);

  lastX = e.clientX;
  lastY = e.clientY;
}

/* limpiar */
document.getElementById("clearBtn").addEventListener("click",()=>{
  canvas.innerHTML = "";
});
</script>

</body>
</html>
