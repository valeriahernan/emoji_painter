<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji/GIF Painter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Toolbar con GIFs y controles -->
<div class="toolbar">
  <img class="gif-btn active" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/5.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/2.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/3.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/4.gif">

  <input type="range" id="size" min="30" max="120" value="60">

  <input type="file" id="upload" accept="image/*">

  <button id="saveBrush">Guardar pincel</button>
  <button id="clearBtn">Limpiar</button>
  <button id="fadeBtn">Fade: ON</button>
  <button id="saveImage">Guardar</button>
<!-- <button id="shareBtn">Compartir</button>-->
</div>

<div id="brushes"></div>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/gifler@0.1.0/dist/gifler.min.js"></script>
<script src="script.js"></script>
</body>
</html>
