<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Emoji Painter</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Zona de dibujo -->
<div id="stage"></div>

<!-- UI mínima -->
<div class="toolbar">
  <button onclick="setGif(0)">😀</button>
  <button onclick="setGif(1)">🔥</button>
  <button onclick="setGif(2)">✨</button>
  <button onclick="changeSize(60)">S</button>
  <button onclick="changeSize(100)">M</button>
  <button onclick="changeSize(140)">L</button>
  <button onclick="clearStage()">🧹</button>
</div>

<script src="app.js"></script>
</body>
</html>
