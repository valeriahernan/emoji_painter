<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GIF Painter</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <img src="gifs/5.gif" onclick="setGif(0)">
  <img src="gifs/2.gif" onclick="setGif(1)">
  <img src="gifs/3.gif" onclick="setGif(2)">

  <!-- Solo desktop -->
  <input id="sizeSlider" type="range" min="40" max="200" value="100">

  <button onclick="clearStage()">🧹</button>
</div>

<!-- Área dibujo -->
<div id="stage"></div>

<script src="app.js"></script>
</body>
</html>
