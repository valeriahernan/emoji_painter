<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GIF Painter</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="toolbar">
  <img class="gif-btn active" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/5.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/2.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/3.gif">
  <img class="gif-btn" src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/4.gif">

  <input type="range" id="size" min="30" max="120" value="60">
  <button id="clearBtn">Limpiar</button>
</div>

<div id="canvas"></div>

<script>
const canvas = document.getElementById("canvas");

let drawing = false;
let currentGif = "gifs/flor.gif";

// presión simulada
let lastX = 0;
let lastY = 0;

/* 🔥 FIX CLICK BOTONES */
document.querySelectorAll(".gif-btn").forEach(btn=>{
  btn.addEventListener("click",(e)=>{
    e.stopPropagation(); // evita que dibuje al hacer click

    document.querySelectorAll(".gif-btn")
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    currentGif = btn.getAttribute("src");
  });
});

/* pointer events */
document.addEventListener("pointerdown",(e)=>{
  // 🔥 evitar dibujar si haces click en toolbar
  if(e.target.closest(".toolbar")) return;

  drawing = true;
  draw(e);
});

document.addEventListener("pointerup",()=>{
  drawing = false;
});

document.addEventListener("pointermove",(e)=>{
  if(!drawing) return;
  draw(e);
});

/* dibujar */
function draw(e){
  const img = document.createElement("img");
  img.className = "gif";
  img.src = currentGif;

  // presión real o simulada
  let pressure = e.pressure;

  if(!pressure || pressure === 0){
    let dx = e.clientX - lastX;
    let dy = e.clientY - lastY;
    let speed = Math.sqrt(dx*dx + dy*dy);
    pressure = Math.min(speed / 20, 1);
  }

  let baseSize = document.getElementById("size").value;
  let size = baseSize * (0.5 + pressure);

  img.style.width = size + "px";
  img.style.left = e.clientX + "px";
  img.style.top = e.clientY + "px";

  let wind = (Math.random() - 0.5) * 120 * pressure;
  img.style.setProperty("--x", wind + "px");

  canvas.appendChild(img);

  setTimeout(()=>img.classList.add("fall"),1000);
  setTimeout(()=>img.remove(),2000);

  lastX = e.clientX;
  lastY = e.clientY;
}

/* limpiar */
document.getElementById("clearBtn").addEventListener("click",(e)=>{
  e.stopPropagation();
  canvas.innerHTML = "";
});
</script>

</body>
</html>
