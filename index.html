<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Painter - Fine Artist Style</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="newCanvas">🆕 Nuevo</button>
    <button class="tool-btn emoji-btn">🦄</button>
    <button class="tool-btn emoji-btn">🌸</button>
    <button class="tool-btn emoji-btn">🌈</button>
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/5.gif">
        <img src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/5.gif" alt="GIF 5">
    </button>
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/2.gif">
        <img src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/2.gif" alt="GIF 2">
    </button>
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/3.gif">
        <img src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/3.gif" alt="GIF 3">
    </button>
</div>

<canvas id="paintCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
