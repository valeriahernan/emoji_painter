<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GIF CHAOS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div>🎯 Puntaje: <span id="score">0</span></div>
  <div>⏱️ Tiempo: <span id="time">30</span></div>
</div>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- Controles -->
<div class="toolbar">
  <button onclick="changeSize(40)">S</button>
  <button onclick="changeSize(80)">M</button>
  <button onclick="changeSize(120)">L</button>
  <button onclick="clearCanvas()">🧹</button>
</div>

<script src="app.js"></script>
</body>
</html>
