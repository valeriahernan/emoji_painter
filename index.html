<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Painter - Fine Artist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="newCanvas">🆕</button>
    <button class="tool-btn toggle-btn" id="toggleGif">🎬 GIF Anim</button>
    <button class="tool-btn" id="uploadImage">📤 Subir</button>

    <!-- Emojis -->
    <button class="tool-btn emoji-btn">🦄</button>
    <button class="tool-btn emoji-btn">🌸</button>
    <button class="tool-btn emoji-btn">🌈</button>

    <!-- GIFs -->
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/5.gif">GIF 5</button>
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/2.gif">GIF 2</button>
    <button class="tool-btn gif-btn" data-src="https://raw.githubusercontent.com/valeriahernan/emoji_painter/refs/heads/main/gifs/3.gif">GIF 3</button>
</div>

<canvas id="paintCanvas"></canvas>
<input type="file" id="fileInput" style="display:none" accept="image/*">

<script src="script.js"></script>
</body>
</html>
